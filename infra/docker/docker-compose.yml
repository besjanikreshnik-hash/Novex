version: '3.8'

services:
  # ============================================================
  # APPLICATION SERVICES
  # ============================================================
  backend:
    build:
      context: ../../packages/backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://novex:novex_dev@postgres:5432/novex
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGINS: http://localhost:3001,http://localhost:3002
      PORT: 3000
    volumes:
      - ../../packages/backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - novex-network

  web:
    build:
      context: ../../packages/web
      dockerfile: Dockerfile
      target: development
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
      PORT: 3001
    volumes:
      - ../../packages/web/src:/app/src
    depends_on:
      - backend
    networks:
      - novex-network

  admin:
    build:
      context: ../../packages/admin
      dockerfile: Dockerfile
      target: development
    ports:
      - "3002:3002"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      PORT: 3002
    volumes:
      - ../../packages/admin/src:/app/src
    depends_on:
      - backend
    networks:
      - novex-network

  # ============================================================
  # DATA STORES
  # ============================================================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: novex
      POSTGRES_PASSWORD: novex_dev
      POSTGRES_DB: novex
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novex-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novex-network

  # ============================================================
  # MESSAGE QUEUE
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - novex-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - novex-network

  # ============================================================
  # DEV TOOLS
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: novex-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    profiles:
      - dev-tools
    networks:
      - novex-network

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    profiles:
      - dev-tools
    networks:
      - novex-network

volumes:
  postgres-data:
  redis-data:

networks:
  novex-network:
    driver: bridge
