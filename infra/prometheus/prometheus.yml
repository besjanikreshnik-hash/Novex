# NovEx — Prometheus Scrape Configuration
#
# Deploy alongside the backend. Each NovEx pod exposes /metrics
# on port 3000. For Kubernetes, use service discovery instead of
# static targets.
#
# docker run -p 9090:9090 -v $(pwd):/etc/prometheus prom/prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── NovEx Backend ──────────────────────────────────────
  - job_name: novex-backend
    metrics_path: /metrics
    scrape_interval: 10s
    # For local development:
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          environment: development
    # For Kubernetes:
    # kubernetes_sd_configs:
