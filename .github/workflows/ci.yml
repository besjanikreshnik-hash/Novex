name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  backend-lint-build:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: novex
          POSTGRES_PASSWORD: novex_test
          POSTGRES_DB: novex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/backend/package-lock.json

      - run: cd packages/backend && npm ci --legacy-peer-deps

      - name: Type check
        run: cd packages/backend && npx tsc --noEmit

      - name: Lint
        run: cd packages/backend && npm run lint --if-present

      - name: Unit tests
        run: cd packages/backend && npm run test
        env:
          DATABASE_URL: postgresql://novex:novex_test@localhost:5432/novex_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret

      - name: Integration tests
        run: cd packages/backend && npm run test:e2e
        env:
          DATABASE_URL: postgresql://novex:novex_test@localhost:5432/novex_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: packages/backend/coverage/

  web-lint-build:
    name: Web Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/web/package-lock.json

      - run: cd packages/web && npm ci --legacy-peer-deps

      - name: Lint
        run: cd packages/web && npm run lint --if-present

      - name: Type check
        run: cd packages/web && npx tsc --noEmit

      - name: Build
        run: cd packages/web && npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.novex.io/api/v1
          NEXT_PUBLIC_WS_URL: wss://ws.novex.io

      - name: Tests
        run: cd packages/web && npm run test --if-present

  admin-build:
    name: Admin Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/admin/package-lock.json

      - run: cd packages/admin && npm ci --legacy-peer-deps

      - name: Lint
        run: cd packages/admin && npm run lint --if-present

      - name: Build
        run: cd packages/admin && npx next build
        env:
          NEXT_PUBLIC_API_URL: https://api.novex.io/api/v1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint-build, web-lint-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: packages/backend
          push: false
          tags: novex-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: packages/web
          push: false
          tags: novex-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
