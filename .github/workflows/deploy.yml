name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker build -t $ECR_REGISTRY/novex-backend:${{ github.sha }} \
            --target production packages/backend
          docker push $ECR_REGISTRY/novex-backend:${{ github.sha }}
          docker build -t $ECR_REGISTRY/novex-web:${{ github.sha }} \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ vars.WS_URL }} \
            packages/web
          docker push $ECR_REGISTRY/novex-web:${{ github.sha }}

      - name: Run database migrations
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          aws ecs run-task \
            --cluster novex-${{ inputs.environment }} \
            --task-definition novex-migration-${{ inputs.environment }} \
            --overrides '{"containerOverrides":[{"name":"migration","image":"'"$ECR_REGISTRY/novex-backend:${{ github.sha }}"'"}]}' \
            --network-configuration "$(aws ecs describe-services --cluster novex-${{ inputs.environment }} --services novex-backend --query 'services[0].networkConfiguration' --output json)" \
            --launch-type FARGATE

      - name: Deploy services
        run: |
          aws ecs update-service \
            --cluster novex-${{ inputs.environment }} \
            --service novex-backend \
            --force-new-deployment
          aws ecs update-service \
            --cluster novex-${{ inputs.environment }} \
            --service novex-web \
            --force-new-deployment

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster novex-${{ inputs.environment }} \
            --services novex-backend novex-web

      - name: Smoke test
        if: inputs.environment != 'prod'
        run: |
          HEALTH_URL=${{ vars.API_URL }}/health
          for i in 1 2 3 4 5; do
            if curl -sf "$HEALTH_URL"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,workflow
          text: 'Deployed to ${{ inputs.environment }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
