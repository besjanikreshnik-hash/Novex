name: Deploy Staging

on:
  push:
    branches: [develop]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: novex-staging

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t $ECR_REGISTRY/novex-backend:${{ github.sha }} \
            --target production packages/backend
          docker push $ECR_REGISTRY/novex-backend:${{ github.sha }}

      - name: Build and push web image
        run: |
          docker build -t $ECR_REGISTRY/novex-web:${{ github.sha }} \
            --target production \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.API_URL }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ vars.WS_URL }} \
            packages/web
          docker push $ECR_REGISTRY/novex-web:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Run database migrations
        run: |
          kubectl run migration-${{ github.sha }} \
            --image=$ECR_REGISTRY/novex-backend:${{ github.sha }} \
            --restart=Never \
            --namespace=novex-staging \
            --command -- npm run migration:run
          kubectl wait --for=condition=complete \
            job/migration-${{ github.sha }} \
            --namespace=novex-staging \
            --timeout=120s

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/novex-backend \
            backend=$ECR_REGISTRY/novex-backend:${{ github.sha }} \
            --namespace=novex-staging
          kubectl set image deployment/novex-web \
            web=$ECR_REGISTRY/novex-web:${{ github.sha }} \
            --namespace=novex-staging
          kubectl rollout status deployment/novex-backend \
            --namespace=novex-staging --timeout=300s
          kubectl rollout status deployment/novex-web \
            --namespace=novex-staging --timeout=300s

      - name: Run smoke tests
        run: |
          STAGING_URL=${{ vars.STAGING_URL }}
          curl -f $STAGING_URL/api/v1/health || exit 1
          echo "Smoke test passed"

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
